<!DOCTYPE html>
<html lang="tr">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>Tr_Chat | V3 Ultra-Fast</title>
    <script src="https://cdn.tailwindcss.com"></script>
    <script src="https://www.gstatic.com/firebasejs/8.10.1/firebase-app.js"></script>
    <script src="https://www.gstatic.com/firebasejs/8.10.1/firebase-database.js"></script>
    <style>
        @import url('https://fonts.googleapis.com/css2?family=Inter:wght@400;600;700&display=swap');
        body { font-family: 'Inter', sans-serif; background-color: #36393f; }
        ::-webkit-scrollbar { width: 6px; }
        ::-webkit-scrollbar-track { background: #2f3136; }
        ::-webkit-scrollbar-thumb { background: #202225; border-radius: 10px; }
        .fade-in { animation: fadeIn 0.2s ease-out; }
        @keyframes fadeIn { from { opacity: 0; transform: translateY(5px); } to { opacity: 1; transform: translateY(0); } }
    </style>
</head>
<body class="text-gray-100 h-screen flex overflow-hidden">

<div class="w-16 bg-[#202225] flex flex-col items-center py-4 gap-4 flex-shrink-0">
    <div class="w-12 h-12 bg-indigo-600 text-white rounded-[24px] hover:rounded-[16px] transition-all duration-300 cursor-pointer flex items-center justify-center font-bold shadow-lg text-xl">TR</div>
</div>

<div class="w-64 bg-[#2f3136] flex flex-col hidden md:flex flex-shrink-0">
    <div class="h-12 border-b border-[#202225] flex items-center px-4 font-bold text-white"># Kanallar</div>
    <div class="p-3">
        <div class="bg-[#393c43] p-2 rounded-md text-white font-medium flex items-center">
            <span class="text-gray-500 mr-2 text-xl">#</span> genel-sohbet
        </div>
    </div>
    
    <div class="mt-4 px-4 font-bold text-xs text-gray-400 uppercase tracking-widest flex justify-between">
        Çevrimiçi <span id="online-count" class="text-green-500">0</span>
    </div>
    <div class="flex-1 overflow-y-auto p-2" id="online-users-list"></div>

    <div class="bg-[#292b2f] p-3 flex items-center gap-3">
        <div class="w-8 h-8 bg-indigo-500 rounded-full flex items-center justify-center font-bold text-xs" id="u-av">?</div>
        <div class="flex-1 overflow-hidden">
            <div class="text-sm font-bold truncate" id="u-name">...</div>
            <div class="text-[10px] text-green-400 font-bold uppercase tracking-tighter">Aktif</div>
        </div>
    </div>
</div>

<div class="flex-1 flex flex-col min-w-0">
    <div class="h-12 border-b border-[#202225] flex items-center px-4 justify-between bg-[#36393f] z-20 shadow-md">
        <div class="flex items-center">
            <span class="text-gray-400 text-2xl mr-2 font-light">#</span>
            <span class="font-bold">genel-sohbet</span>
        </div>
        <div id="typing-box" class="text-sm text-indigo-400 font-semibold italic animate-pulse"></div>
    </div>

    <div class="flex-1 p-4 overflow-y-auto flex flex-col gap-2" id="chat-box"></div>

    <div class="p-4 bg-[#36393f]">
        <div class="bg-[#40444b] rounded-lg flex items-center p-2 shadow-lg">
            <button onclick="document.getElementById('imgInp').click()" class="w-9 h-9 flex items-center justify-center bg-gray-500 hover:bg-gray-400 text-white rounded-md transition-all mr-3">
                <span class="text-2xl font-bold">+</span>
            </button>
            <input type="file" id="imgInp" class="hidden" accept="image/*" onchange="hizliYukle(event)">
            
            <input type="text" id="msgInp" placeholder="Buraya bir şeyler yaz..." class="bg-transparent flex-1 outline-none text-gray-100 placeholder-gray-500 text-sm">
            
            <button onclick="mesajGonder()" class="ml-3 bg-indigo-500 hover:bg-indigo-600 text-white px-4 py-2 rounded-md font-bold transition-all active:scale-95">Gönder</button>
        </div>
    </div>
</div>

<script>
    // FIREBASE AYARLARI
    const config = {
        apiKey: "AIzaSyBpCLRiS8pHlTgvVmNLH92u3VszvT25xPs",
        authDomain: "trchat-7bc26.firebaseapp.com",
        databaseURL: "https://trchat-7bc26-default-rtdb.firebaseio.com", 
        projectId: "trchat-7bc26"
    };
    firebase.initializeApp(config);
    const db = firebase.database();

    // KULLANICI BİLGİSİ
    const myId = Math.random().toString(36).substring(7);
    let myName = prompt("Tr_Chat'e Hoş Geldin! Adın ne?") || "Kullanıcı_" + Math.floor(Math.random()*99);
    
    document.getElementById("u-name").innerText = myName;
    document.getElementById("u-av").innerText = myName.charAt(0).toUpperCase();

    // --- ANLIK ONLINE SİSTEMİ (JET HIZINDA) ---
    const onlineRef = db.ref('onlineKullanicilar/' + myId);
    const connRef = db.ref('.info/connected');

    connRef.on('value', snap => {
        if (snap.val()) {
            // Bağlantı koptuğu an silinsin
            onlineRef.onDisconnect().remove();
            db.ref('yaziyor/' + myId).onDisconnect().remove();
            // Sisteme kaydol
            onlineRef.set({ name: myName });
        }
    });

    // Sayfa Kapanırken Anında Silme Zorlaması (Gecikmeyi önlemek için)
    window.addEventListener('beforeunload', () => {
        onlineRef.remove();
        db.ref('yaziyor/' + myId).remove();
    });

    db.ref('onlineKullanicilar').on('value', snap => {
        const list = document.getElementById('online-users-list');
        const count = document.getElementById('online-count');
        list.innerHTML = '';
        let num = 0;
        snap.forEach(child => {
            num++;
            list.innerHTML += `
                <div class="flex items-center gap-2 p-2 hover:bg-[#393c43] rounded-md transition-all fade-in">
                    <div class="w-7 h-7 bg-indigo-500 rounded-full flex items-center justify-center font-bold text-[10px] shadow-sm">${child.val().name.charAt(0).toUpperCase()}</div>
                    <span class="text-sm font-medium text-gray-300 truncate">${child.val().name}</span>
                    <div class="w-2 h-2 bg-green-500 rounded-full ml-auto shadow-[0_0_5px_#22c55e]"></div>
                </div>`;
        });
        count.innerText = num;
    });

    // --- YAZIYOR GÖSTERGESİ (YUKARIDA) ---
    const msgInp = document.getElementById("msgInp");
    let tTimer;

    msgInp.addEventListener('input', () => {
        if(msgInp.value.trim() !== "") {
            db.ref('yaziyor/' + myId).set(myName);
            clearTimeout(tTimer);
            tTimer = setTimeout(() => db.ref('yaziyor/' + myId).remove(), 2000);
        } else {
            db.ref('yaziyor/' + myId).remove();
        }
    });

    db.ref('yaziyor').on('value', snap => {
        const box = document.getElementById('typing-box');
        let typers = [];
        snap.forEach(c => { if(c.key !== myId) typers.push(c.val()); });
        box.innerText = typers.length > 0 ? typers.join(', ') + " yazıyor..." : "";
    });

    // --- RESİM YÜKLEME (IMGBB) ---
    function hizliYukle(e) {
        const file = e.target.files[0];
        if(!file) return;

        const key = "de4827bd8b03b0a3bab867e72b366172";
        const form = new FormData();
        form.append("image", file);

        msgInp.placeholder = "Resim yükleniyor...";
        msgInp.disabled = true;

        fetch(`https://api.imgbb.com/1/upload?key=${key}`, { method: "POST", body: form })
        .then(r => r.json())
        .then(res => {
            if(res.success) {
                db.ref("mesajlar").push({
                    isim: myName,
                    mesaj: "",
                    img: res.data.url,
                    vakit: new Date().toLocaleTimeString('tr-TR', {hour: '2-digit', minute:'2-digit'})
                });
            }
            msgInp.disabled = false;
            msgInp.placeholder = "Buraya bir şeyler yaz...";
            msgInp.focus();
        });
    }

    // --- MESAJ GÖNDERME ---
    function mesajGonder() {
        const txt = msgInp.value.trim();
        if(!txt) return;

        db.ref("mesajlar").push({
            isim: myName,
            mesaj: txt,
            img: null,
            vakit: new Date().toLocaleTimeString('tr-TR', {hour: '2-digit', minute:'2-digit'})
        });
        msgInp.value = "";
        db.ref('yaziyor/' + myId).remove();
    }
    msgInp.addEventListener("keypress", e => { if(e.key === "Enter") mesajGonder(); });

    // --- MESAJLARI GÖRÜNTÜLE ---
    db.ref("mesajlar").limitToLast(40).on("child_added", snap => {
        const d = snap.val();
        const box = document.getElementById("chat-box");
        const div = document.createElement("div");
        div.className = "flex flex-col mb-1 group fade-in p-1 rounded hover:bg-[#32353b]";
        
        let content = `
            <div class="flex items-center gap-2">
                <span class="font-bold text-indigo-400 text-sm">${d.isim}</span>
                <span class="text-[10px] text-gray-500 font-bold">${d.vakit}</span>
            </div>
            ${d.mesaj ? `<p class="text-gray-200 text-sm leading-relaxed">${d.mesaj}</p>` : ""}
            ${d.img ? `<img src="${d.img}" class="mt-2 rounded-lg max-w-[280px] border border-[#202225] shadow-md cursor-pointer" onclick="window.open(this.src)">` : ""}
        `;
        
        div.innerHTML = content;
        box.appendChild(div);
        box.scrollTop = box.scrollHeight;
    });
</script>
</body>
</html>
